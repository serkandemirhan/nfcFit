version: '3.9'
services:
  db:
    image: postgres:16
    container_name: nfc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nfc
      POSTGRES_USER: nfc
      POSTGRES_PASSWORD: nfc
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata:
